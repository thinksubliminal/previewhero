<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hero Preview — Live Camera v1.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0a0a0a;
    --paper: #f4f1eb;
    --accent: #ff3c00;
    --dim: rgba(10,10,10,0.55);
    --mono: 'Inter', sans-serif;
    --display: 'Syne', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--ink);
    font-family: var(--mono);
    font-weight: 800;
    color: var(--paper);
    -webkit-font-smoothing: antialiased;
  }

  /* ── CAMERA LAYER ── */
  #camera {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    transform: scaleX(-1); /* mirror front cam; toggled off for back */
  }

  /* ── HERO OVERLAY ── */
  #hero-wrap {
    position: fixed; inset: 0;
    z-index: 2;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #hero-img {
    max-width: 100%;
    max-height: 100%;
    width: var(--hero-w, auto);
    height: var(--hero-h, auto);
    object-fit: contain;
    transform:
      translate(var(--tx, 0px), var(--ty, 0px))
      rotate(var(--hero-rot, 0deg))
      scale(var(--scale, 1));
    transform-origin: center center;
    user-select: none;
    -webkit-user-drag: none;
    filter: drop-shadow(0 8px 40px rgba(0,0,0,0.35));
    outline: 1px solid rgba(255,255,255,1);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #hero-img.dragging {
    transition: none;
  }
  }

  /* ── SCRIM LAYER ── */
  #scrim {
    position: fixed; inset: 0;
    z-index: 1;
    background: rgba(0,0,0,0);
    pointer-events: none;
  }

  /* ── DRAG HANDLE (only element that is pointer-events:auto on wrap) ── */
  #drag-handle {
    position: absolute;
    inset: 0;
    pointer-events: auto;
    cursor: move;
    touch-action: none;
  }

  /* ── UI CHROME ── */
  #ui {
    position: fixed; inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 16px) 16px calc(env(safe-area-inset-bottom, 16px) + 16px) 16px;
  }

  /* top bar */
  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: auto;
  }
  #wordmark {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    padding: 5px 10px 4px;
    line-height: 1;
  }
  #status {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--dim);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 5px 10px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #status.show { opacity: 1; }

  /* spacer */
  .flex-1 { flex: 1; }

  /* bottom controls */
  #controls {
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: auto;
  }

  /* slider row */
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--dim);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 3px;
    padding: 10px 14px;
  }
  .ctrl-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--paper);
    opacity: 0.7;
    min-width: 56px;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: rgba(244,241,235,0.25);
    border-radius: 1px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--paper);
  }
  .ctrl-val {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--paper);
    min-width: 36px;
    text-align: right;
    opacity: 0.8;
  }

  /* button row */
  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 8px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.08s, opacity 0.08s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.96); opacity: 0.85; }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .btn-secondary {
    background: rgba(244,241,235,0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--paper);
    border-radius: 100px;
  }
  .btn-icon {
    flex: 0 0 auto;
    width: 42px;
    padding: 12px 0;
    background: rgba(244,241,235,0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--paper);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── EMPTY STATE ── */
  #empty {
    position: fixed; inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px 32px;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #empty.hidden { opacity: 0; pointer-events: none; }
  .empty-ring {
    width: 96px; height: 96px;
    border: 2px dashed rgba(244,241,235,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .empty-title {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    letter-spacing: -0.01em;
    color: var(--paper);
  }
  .empty-sub {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(244,241,235,0.45);
    text-align: center;
    line-height: 1.8;
  }

  /* ── FULLSCREEN SPLASH ── */
  #fs-splash {
    position: fixed; inset: 0;
    z-index: 50;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px 32px;
    transition: opacity 0.4s;
  }
  #fs-splash.gone { opacity: 0; pointer-events: none; }
  .splash-icon {
    width: 72px; height: 72px;
    border: 2px solid rgba(244,241,235,0.2);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .splash-title {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 800;
    text-align: center;
    color: var(--paper);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .splash-sub {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(244,241,235,0.4);
    text-align: center;
    line-height: 1.9;
  }
  .splash-cta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    background: #7D7D7D;
    color: #f4f1eb;
    border: none;
    padding: 10px 24px;
    border-radius: 100px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    box-shadow: inset 0 0 12px rgba(255,255,255,0.25), inset 0 0 32px rgba(255,255,255,0.08);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes vf-pulse {
    0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 4px rgba(255,255,255,0.6)) drop-shadow(0 0 12px rgba(255,255,255,0.25)); }
    50%       { opacity: 0.9; filter: drop-shadow(0 0 8px rgba(255,255,255,1)) drop-shadow(0 0 24px rgba(255,255,255,0.6)) drop-shadow(0 0 48px rgba(255,255,255,0.2)); }
  }
  @keyframes pulse-glow {
    0%, 100% {
      box-shadow: inset 0 0 12px rgba(255,255,255,0.25), inset 0 0 32px rgba(255,255,255,0.08);
    }
    50% {
      box-shadow: inset 0 0 22px rgba(255,255,255,0.45), inset 0 0 52px rgba(255,255,255,0.15);
    }
  }

  /* ── SHOT MODE BADGE ── */
  #shot-badge {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 2px;
    pointer-events: none;
  }
  #shot-badge.desktop {
    background: rgba(29,53,87,0.85);
    color: #a8c4e0;
    border: 1px solid rgba(168,196,224,0.25);
  }
  #shot-badge.mobile {
    background: rgba(20,83,45,0.85);
    color: #86efac;
    border: 1px solid rgba(134,239,172,0.25);
  }
  #shot-badge.show { display: flex; }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.8;
    flex-shrink: 0;
  }

  /* ── LANDSCAPE NUDGE (shown when hero is wide but phone is portrait) ── */
  #landscape-nudge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 12;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: rgba(10,10,10,0.82);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(244,241,235,0.1);
    border-radius: 12px;
    padding: 20px 24px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s;
  }
  #landscape-nudge.show { opacity: 1; }
  .nudge-icon {
    font-size: 28px;
    animation: tilt 1.6s ease-in-out infinite;
  }
  @keyframes tilt {
    0%, 100% { transform: rotate(0deg); }
    40%       { transform: rotate(90deg); }
    60%       { transform: rotate(90deg); }
  }
  .nudge-title {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 800;
    color: var(--paper);
    text-align: center;
  }
  .nudge-sub {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(244,241,235,0.45);
    text-align: center;
    line-height: 1.7;
  }

  /* ── CAPTURE FLASH ── */
  #flash {
    position: fixed; inset: 0;
    z-index: 20;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s;
  }
  #flash.pop { opacity: 1; }

  /* ── HIDDEN FILE INPUT ── */
  #file-input { display: none; }

  /* pinch scale hint */
  #hint {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(244,241,235,0.5);
    text-align: center;
    padding: 6px 0 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    white-space: nowrap;
  }
  #hint.show { opacity: 1; }

  /* swatches */
  #swatches {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    padding: 0;
    transition: transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .swatch:active { transform: scale(0.9); }
  .swatch.active { border-color: var(--accent); transform: scale(1.15); }

  /* screenshot canvas (hidden) */
  #snap-canvas { display: none; }
</style>
</head>
<body>

<div id="fs-splash">
  <svg viewBox="0 0 1420 226" xmlns="http://www.w3.org/2000/svg" style="position:fixed;top:20px;left:20px;width:120px;opacity:0.92;pointer-events:none;">
    <g transform="matrix(0.988417,0,0,1,-198.671815,-621)">
      <g transform="matrix(3.238715,0,0,3.201201,-1947.199753,-1565.048261)">
        <text x="669.459px" y="736.372px" style="font-family:'Inter',sans-serif;font-weight:700;font-size:50px;fill:white;letter-spacing:4px;">PREVIEW HERO</text>
      </g>
    </g>
  </svg>
  <button class="splash-cta" id="fs-btn">Tap to open camera</button>
</div>

<video id="camera" autoplay playsinline muted></video>

<div id="scrim"></div>

<div id="hero-wrap">
  <div id="drag-handle"></div>
  <img id="hero-img" src="" alt="hero overlay" style="display:none">
</div>

<div id="empty"></div>

<div id="flash"></div>
<canvas id="snap-canvas"></canvas>

<div id="ui">
  <div id="topbar">
    <div id="wordmark">Hero Preview</div>
    <div style="display:flex;gap:8px;align-items:flex-start;">
      <div id="shot-badge"><span class="badge-dot"></span><span id="badge-label">Desktop shot</span></div>
      <div id="status"></div>
    </div>
  </div>
  <div class="flex-1"></div>
  <div id="controls">
    <div class="ctrl-row" id="desktop-scale-row" style="display:none">
      <span class="ctrl-label">Scale</span>
      <input type="range" id="scale-slider" min="20" max="200" value="100">
      <span class="ctrl-val" id="scale-val">100%</span>
    </div>
    <div id="hint">pinch to scale · drag to reposition</div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="upload-btn">Upload PNG</button>
      <button class="btn btn-secondary" id="flip-btn">Flip Cam</button>
      <button id="snap-btn" title="Take photo" style="
        flex: 0 0 auto;
        width: 56px; height: 56px;
        border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.85);
        background: transparent;
        padding: 0;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      ">
        <span style="
          display: block;
          width: 44px; height: 44px;
          border-radius: 50%;
          background: #fff;
          transition: transform 0.08s;
        "></span>
      </button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/png">

<script>
const video   = document.getElementById('camera');
const heroImg = document.getElementById('hero-img');
const heroWrap= document.getElementById('hero-wrap');
const dragH   = document.getElementById('drag-handle');
const empty   = document.getElementById('empty');
const flash   = document.getElementById('flash');
const statusEl= document.getElementById('status');
const canvas  = document.getElementById('snap-canvas');

const shotBadge      = document.getElementById('shot-badge');
const badgeLabel     = document.getElementById('badge-label');

let facingMode = 'environment';
let stream = null;
let heroLoaded = false;
let heroIsLandscape = false;

// ── STATE ──
let tx = 0, ty = 0, scale = 1;
let isDragging = false;
let dragStartX, dragStartY, dragStartTX, dragStartTY;
let pinchStartDist = 0, pinchStartScale = 1;

function isPhoneLandscape() {
  return window.innerWidth > window.innerHeight;
}

function updateBadge() {
  if (!heroLoaded) return;
  if (document.getElementById('shot-badge').style.display === 'none') return;
  const landscape = isPhoneLandscape();
  shotBadge.classList.add('show');
  shotBadge.classList.toggle('desktop', landscape);
  shotBadge.classList.toggle('mobile', !landscape);
  badgeLabel.textContent = landscape ? 'Desktop shot' : 'Mobile shot';
}

const isMobileDevice = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || 'ontouchstart' in window;

function setHeroVars() {
  const root = document.documentElement;
  root.style.setProperty('--tx', tx + 'px');
  root.style.setProperty('--ty', ty + 'px');
  root.style.setProperty('--scale', scale);
  root.style.setProperty('--hero-rot', heroIsLandscape ? '90deg' : '0deg');
}

// ── DESKTOP SCALE SLIDER ──
if (!isMobileDevice) {
  const scaleRow = document.getElementById('desktop-scale-row');
  const scaleSlider = document.getElementById('scale-slider');
  const scaleVal = document.getElementById('scale-val');
  scaleRow.style.display = 'flex';
  scaleSlider.addEventListener('input', () => {
    scale = scaleSlider.value / 100;
    scaleVal.textContent = scaleSlider.value + '%';
    setHeroVars();
  });
}

// ── CAMERA ──
async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    const constraints = {
      video: {
        facingMode,
        width:  { ideal: 4096 },
        height: { ideal: 2160 }
      },
      audio: false
    };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
  } catch(e) {
    showStatus('Camera error: ' + e.message);
  }
}

// ── UPLOAD ──
document.getElementById('upload-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  loadHero(file);
  e.target.value = '';
});

// drag-drop on whole page
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'image/png') loadHero(file);
});

function loadHero(file) {
  const url = URL.createObjectURL(file);
  heroImg.onload = () => {
    heroLoaded = true;
    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || 'ontouchstart' in window;
    heroIsLandscape = isMobile && heroImg.naturalWidth > heroImg.naturalHeight;
    empty.classList.add('hidden');
    heroImg.style.display = 'block';
    tx = 0; ty = 0;
    scale = 1;

    setHeroVars();
    updateBadge();
    if (heroIsLandscape && !isPhoneLandscape()) {
      setTimeout(() => {}, 0);
    }
    showHint();
  };
  heroImg.src = url;
}

// ── FLIP CAM ──
document.getElementById('flip-btn').addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

// ── DRAG (touch + mouse) ──
dragH.addEventListener('mousedown', e => {
  if (!heroLoaded) return;
  isDragging = true;
  heroImg.classList.add('dragging');
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragStartTX = tx; dragStartTY = ty;
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  tx = dragStartTX + (e.clientX - dragStartX);
  ty = dragStartTY + (e.clientY - dragStartY);
  setHeroVars();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  heroImg.classList.remove('dragging');
});

// touch drag + pinch
dragH.addEventListener('touchstart', e => {
  if (!heroLoaded) return;
  heroImg.classList.add('dragging');
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    dragStartTX = tx; dragStartTY = ty;
  } else if (e.touches.length === 2) {
    isDragging = false;
    pinchStartDist = getPinchDist(e.touches);
    pinchStartScale = scale;
  }
  e.preventDefault();
}, { passive: false });

dragH.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    tx = dragStartTX + (e.touches[0].clientX - dragStartX);
    ty = dragStartTY + (e.touches[0].clientY - dragStartY);
    setHeroVars();
  } else if (e.touches.length === 2) {
    const dist = getPinchDist(e.touches);
    scale = Math.min(4, Math.max(0.1, pinchStartScale * (dist / pinchStartDist)));
    setHeroVars();
  }
  e.preventDefault();
}, { passive: false });

dragH.addEventListener('touchend', () => {
  isDragging = false;
  heroImg.classList.remove('dragging');
});

function getPinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

// ── SCREENSHOT ──
const snapBtn = document.getElementById('snap-btn');
const snapInner = snapBtn.querySelector('span');

snapBtn.addEventListener('click', async () => {
  if (!heroLoaded) { showStatus('Load a hero image first'); return; }

  snapInner.style.transform = 'scale(0.85)';
  setTimeout(() => snapInner.style.transform = 'scale(1)', 120);

  flash.classList.add('pop');
  setTimeout(() => flash.classList.remove('pop'), 120);

  const vw = video.videoWidth  || window.innerWidth;
  const vh = video.videoHeight || window.innerHeight;
  canvas.width = vw; canvas.height = vh;
  const ctx = canvas.getContext('2d');

  if (facingMode === 'user') {
    ctx.save();
    ctx.translate(vw, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, vw, vh);
    ctx.restore();
  } else {
    ctx.drawImage(video, 0, 0, vw, vh);
  }

  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'hero-preview-' + Date.now() + '.png';
    a.click();
    showStatus('Photo saved');
  }, 'image/png');
});

// ── HELPERS ──
function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.classList.add('show');
  clearTimeout(statusEl._t);
  statusEl._t = setTimeout(() => statusEl.classList.remove('show'), 3000);
}

function showHint() {
  const hint = document.getElementById('hint');
  hint.classList.add('show');
  clearTimeout(hint._t);
  hint._t = setTimeout(() => hint.classList.remove('show'), 5000);
}

// ── FULLSCREEN + ORIENTATION ──
const splash   = document.getElementById('fs-splash');
const fsBtn    = document.getElementById('fs-btn');
const isIOS    = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

async function enterFullscreen() {
  try {
    await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
  } catch(e) {}
  splash.classList.add('gone');
  document.getElementById('wordmark').style.display = 'none';
  document.getElementById('shot-badge').style.display = 'none';
  startCamera();

  // Push a history state so back button returns to splash
  history.pushState({ cam: true }, '');

  // Lock orientation (non-iOS only)
  if (!isIOS && screen.orientation && screen.orientation.lock) {
    try { await screen.orientation.lock('any'); } catch(e) {}
  }
}

fsBtn.addEventListener('click', enterFullscreen);

// ── BACK BUTTON → return to splash ──
window.addEventListener('popstate', () => {
  // Stop all camera tracks completely
  if (stream) {
    stream.getTracks().forEach(t => { t.stop(); });
    stream = null;
  }
  video.srcObject = null;
  video.load();

  // Reset hero state
  heroLoaded = false;
  heroImg.src = '';
  heroImg.style.display = 'none';
  tx = 0; ty = 0; scale = 1;
  setHeroVars();

  // Return to splash
  splash.classList.remove('gone');
  splash.style.opacity = '1';
  splash.style.pointerEvents = 'auto';
});

// ── ORIENTATION CHANGE ──
function onOrientationChange() {
  tx = 0; ty = 0;
  setHeroVars();
  updateBadge();
}

screen.orientation
  ? screen.orientation.addEventListener('change', onOrientationChange)
  : window.addEventListener('orientationchange', onOrientationChange);

// ── INIT ──
setHeroVars();
</script>
</body>
</html>
